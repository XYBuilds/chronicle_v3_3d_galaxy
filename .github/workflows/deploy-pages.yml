name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm (optional deps bugfix)
        run: npm i -g npm@10.8.3

      # Workaround for https://github.com/npm/cli/issues/4828:
      # `npm ci` on Linux can skip platform-specific optional native deps
      # (rolldown, lightningcss, @tailwindcss/oxide, ...). Regenerate lockfile
      # + node_modules on the Linux runner so all linux-x64-gnu bindings land.
      - name: Install (fresh, no stale lockfile)
        run: |
          rm -rf node_modules frontend/node_modules package-lock.json
          npm install --include=optional --no-audit --no-fund

      - name: Build
        run: npm run build -w frontend

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

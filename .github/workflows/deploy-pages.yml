name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: |
          npm ci --include=optional
          cd frontend
          ROLLDOWN_VER=$(node -p "require('./node_modules/rolldown/package.json').version")
          LIGHTNINGCSS_VER=$(node -p "require('./node_modules/lightningcss/package.json').version")
          npm i --no-save "@rolldown/binding-linux-x64-gnu@${ROLLDOWN_VER}" "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VER}"
          node -e "require.resolve('@rolldown/binding-linux-x64-gnu'); require.resolve('lightningcss-linux-x64-gnu'); console.log('native bindings ok')"
          cd ..
          npm run build -w frontend

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# Chronicle Phase 6 M2 — conda environment: RAPIDS cuML + PyTorch (CUDA 12.x)
# Channels and pins follow plan §8.3.3 (phase_6_gpu_migration_202aac8f.plan.md).
#
# Prerequisites: WSL2 Ubuntu + NVIDIA driver with WSL GPU; M1 bootstrap optional
# (system Python is not used once this env is active).
#
# Create (from repo root on WSL/Linux):
#   bash scripts/env/install_chronicle_conda_env.sh
#   # or manually:
#   mamba env create -f scripts/env/rapids_env.yml
#
# Smoke:
#   mamba activate chronicle
#   python -c "import cuml; from cuml.manifold import UMAP; print('OK')"
#
# If mamba fails to solve (CUDA / channel conflicts), see the pip wheel fallback
# printed by install_chronicle_conda_env.sh or RAPIDS “Release Selector” docs.
#
# M3: After activation, add pip-only packages (rare) via `requirements.gpu.txt`
# at repo root — keep minimal to avoid conflicting with this conda stack.
#
name: chronicle
channels:
  - rapidsai
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.11
  - cuda-version=12.5
  - cuml=25.*
  # pytorch-cuda lives on the pytorch channel (not conda-forge alone)
  - pytorch::pytorch
  - pytorch::pytorch-cuda=12.4
  - sentence-transformers
  - joblib
  - tqdm
  - pandas
  - numpy
  # cuml 25.x fails to import with scikit-learn 1.8+ (BaseEstimator API); keep <1.8 until RAPIDS catches up
  - scikit-learn>=1.4,<1.8
  - umap-learn
